############################
# Shared Resources (namespace, ingress)
############################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: togglemaster-shared
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: togglemaster
spec:
  project: togglemaster
  source:
    repoURL: https://github.com/<GITHUB_USER>/TC3-ToggleMaster.git
    targetRevision: main
    path: gitops
    directory:
      include: '{namespace.yaml,ingress.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: togglemaster
  syncPolicy:
    automated:
