name: CI - Analytics Service

on:
  push:
    branches: [main]
    paths:
      - 'microservices/analytics-service/**'
  pull_request:
    branches: [main]
    paths:
      - 'microservices/analytics-service/**'

env:
  SERVICE_NAME: analytics-service
  SERVICE_PATH: microservices/analytics-service
  AWS_REGION: us-east-1

jobs:
  build-and-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: microservices/analytics-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest -v || echo "No tests found"

  lint:
    name: Linter / Static Analysis
    needs: build-and-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: microservices/analytics-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 --max-line-length=120 .

  security-scan:
    name: Security Scan (SAST & SCA)
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: microservices/analytics-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: SCA - Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'microservices/analytics-service'
          severity: 'CRITICAL'
          exit-code: '1'

      - name: SAST - Install bandit
        run: pip install bandit

      - name: SAST - Run bandit
        run: bandit -r . --severity-level high

  docker-build-push:
    name: Docker Build & Push to ECR
    needs: security-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.ECR_REGISTRY }}/analytics-service:${{ steps.meta.outputs.short_sha }} \
            microservices/analytics-service

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.ECR_REGISTRY }}/analytics-service:${{ steps.meta.outputs.short_sha }}'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Push to ECR
        run: |
          # Skip push if image tag already exists (handles re-runs with immutable tags)
          if aws ecr describe-images --repository-name analytics-service --image-ids imageTag=${{ steps.meta.outputs.short_sha }} 2>/dev/null; then
            echo "Image tag ${{ steps.meta.outputs.short_sha }} already exists in ECR, skipping push."
          else
            docker push ${{ secrets.ECR_REGISTRY }}/analytics-service:${{ steps.meta.outputs.short_sha }}
          fi

  update-gitops:
    name: Update GitOps Manifests
    needs: docker-build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Update deployment image tag
        run: |
          sed -i "s|image: .*analytics-service:.*|image: ${{ secrets.ECR_REGISTRY }}/analytics-service:${{ steps.meta.outputs.short_sha }}|" \
            gitops/analytics-service/deployment.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/analytics-service/deployment.yaml
          git commit -m "chore: update analytics-service image to ${{ steps.meta.outputs.short_sha }}"
          # Retry loop to handle concurrent pushes from other service pipelines
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done
