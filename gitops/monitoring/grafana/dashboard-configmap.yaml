apiVersion: v1
kind: ConfigMap
metadata:
  name: togglemaster-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: togglemaster
  annotations:
    grafana_folder: "ToggleMaster"
data:
  togglemaster-overview.json: |-
    {{- .Files.Get "dashboards/togglemaster-overview.json" | nindent 4 }}
