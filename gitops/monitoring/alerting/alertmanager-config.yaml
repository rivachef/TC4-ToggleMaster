# Alertmanager Configuration Secret
# This configures alert routing to PagerDuty and Discord
#
# IMPORTANT: Copy this to alertmanager-secret.yaml and fill in your keys
# DO NOT commit the actual secret to git
#
# Apply: kubectl apply -f gitops/monitoring/alerting/alertmanager-secret.yaml
#
# NOTE: The secret name MUST match the Helm-managed secret:
#   alertmanager-prometheus-kube-prometheus-alertmanager
# Discord webhooks accept Slack-format messages via the /slack URL suffix.
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-prometheus-kube-prometheus-alertmanager
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: togglemaster
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'service']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'togglemaster-default'

      routes:
        # Silence Watchdog (heartbeat alert, not actionable)
        - match:
            alertname: Watchdog
          receiver: 'null'

        # Silence KubeControllerManagerDown (expected on managed EKS)
        - match:
            alertname: KubeControllerManagerDown
          receiver: 'null'

        # Critical alerts -> PagerDuty + Discord + Self-Healing
        - match:
            severity: critical
          receiver: 'togglemaster-critical'
          continue: true

        # Warning alerts -> Discord only
        - match:
            severity: warning
          receiver: 'togglemaster-warning'

    receivers:
      - name: 'null'

      - name: 'togglemaster-default'
        slack_configs:
          - api_url: '<DISCORD_WEBHOOK_URL>/slack'
            channel: '#alerts'
            send_resolved: true
            title: '{{ .CommonLabels.alertname }}'
            text: >-
              {{ range .Alerts }}
              *Alert:* {{ .Labels.alertname }} - {{ .Labels.severity }}
              *Summary:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              {{ end }}

      - name: 'togglemaster-critical'
        pagerduty_configs:
          - routing_key: '<PAGERDUTY_INTEGRATION_KEY>'
            severity: critical
            description: '{{ .CommonAnnotations.summary }}'
            details:
              description: '{{ .CommonAnnotations.description }}'
              service: '{{ .CommonLabels.service }}'
        slack_configs:
          - api_url: '<DISCORD_WEBHOOK_URL>/slack'
            channel: '#alerts'
            send_resolved: true
            title: 'CRITICAL: {{ .CommonLabels.alertname }}'
            text: >-
              {{ range .Alerts }}
              *Alert:* {{ .Labels.alertname }} - CRITICAL
              *Summary:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              {{ end }}
        webhook_configs:
          # Self-Healing webhook (GitHub Actions repository_dispatch)
          - url: 'https://api.github.com/repos/<GITHUB_USER>/TC4-ToggleMaster/dispatches'
            http_config:
              authorization:
                type: Bearer
                credentials: '<GITHUB_PAT_TOKEN>'
            send_resolved: false
            max_alerts: 1

      - name: 'togglemaster-warning'
        slack_configs:
          - api_url: '<DISCORD_WEBHOOK_URL>/slack'
            channel: '#alerts'
            send_resolved: true
            title: 'WARNING: {{ .CommonLabels.alertname }}'
            text: >-
              {{ range .Alerts }}
              *Alert:* {{ .Labels.alertname }} - WARNING
              *Summary:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              {{ end }}

    # Inhibit rules: critical silences warning for same alert
    inhibit_rules:
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: ['alertname']
