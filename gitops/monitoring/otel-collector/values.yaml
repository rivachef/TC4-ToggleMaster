# OpenTelemetry Collector Helm values
# Chart: open-telemetry/opentelemetry-collector

mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib

replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 300m
    memory: 512Mi

# Ports exposed by the collector
ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  metrics:
    enabled: true
    containerPort: 8888
    servicePort: 8888
    protocol: TCP

# Service configuration
service:
  type: ClusterIP

# -------------------------------------------------------
# OTel Collector Pipeline Configuration
# -------------------------------------------------------
config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    batch:
      timeout: 5s
      send_batch_size: 1024
      send_batch_max_size: 2048

    memory_limiter:
      check_interval: 5s
      limit_mib: 400
      spike_limit_mib: 100

    resource:
      attributes:
        - key: cluster.name
          value: togglemaster-cluster
          action: upsert
        - key: environment
          value: production
          action: upsert

  exporters:
    # Prometheus remote write (metrics -> Prometheus)
    prometheusremotewrite:
      endpoint: "http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
      resource_to_telemetry_conversion:
        enabled: true

    # Loki exporter (logs -> Loki via OTLP)
    otlphttp/loki:
      endpoint: "http://loki.monitoring.svc.cluster.local:3100/otlp"

    # OTLP HTTP exporter (traces + metrics -> New Relic)
    # Using HTTP/protobuf instead of gRPC for reliability
    otlphttp/newrelic:
      endpoint: "https://otlp.nr-data.net"
      headers:
        api-key: "${NEW_RELIC_LICENSE_KEY}"

    # Debug exporter for troubleshooting
    debug:
      verbosity: basic

  extensions:
    health_check:
      endpoint: 0.0.0.0:13133

  service:
    extensions: [health_check]
    pipelines:
      # Traces pipeline: apps -> OTel -> New Relic
      traces:
        receivers: [otlp]
        processors: [memory_limiter, resource, batch]
        exporters: [otlphttp/newrelic, debug]

      # Metrics pipeline: apps -> OTel -> Prometheus + New Relic
      # New Relic needs metrics too for Service Map to work
      metrics:
        receivers: [otlp]
        processors: [memory_limiter, resource, batch]
        exporters: [prometheusremotewrite, otlphttp/newrelic, debug]

      # Logs pipeline: apps -> OTel -> Loki
      logs:
        receivers: [otlp]
        processors: [memory_limiter, resource, batch]
        exporters: [otlphttp/loki, debug]

    telemetry:
      metrics:
        address: 0.0.0.0:8888

# Environment variables (New Relic key from secret)
extraEnvs:
  - name: NEW_RELIC_LICENSE_KEY
    valueFrom:
      secretKeyRef:
        name: newrelic-license-key
        key: license-key
        optional: true
